<!DOCTYPE html>

<head>

<body class="container">
    <!-- nav bar -->
    <nav class="flex flex-col lg:flex-row justify-evenly p-4 border-2">
        <a href="index.html" class="md:text-2xl text-sm text-red-400 font-bold">
            Hi! Flowers</a>
        <a href="./about.html" class="navlink">About Us</a>
        <a href="./contact.html" class="navlink">Contact Us</a>
        <a href="./gallery.html" class="navlink">Our Gallery</a>

    <div class="flex lg:flex-row gap-8 justify-between

        <div>
            <h2 class="lg:text-5xl text-4xl font-bold">Contact Us</h2>

            <div class="flex lg:flex-row lg:gap-20 lg:text-xl

                    <input type="text" name="full_name" placeholder="Full Name" class="form"">

                    <button type="submit" class="btn">
                        Contact Us
                    </button>
                </form>

                <div class="flex flex-col gap-10 lg:gap-20">
                    <p>Contact <br>
                        <span class="text-gray-500">hi@flowers.com</span>
                    </p>
                    <p>Based In <br>
                        <span class="text-gray-500">Lagos, Nigeria</span>
                    </p>

                    <div class="flex gap-8">
                        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#"><i class="fa-brands fa-twitter"></i></a>

                </div>
